<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #ffe6f0;
}

.container {
    margin-top: 50px;
}

textarea {
    padding: 10px;
    width: 260px;
    height: 80px;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
}

#yes { background: #4CAF50; color: white; }
#no {
    background: #ff4d4d;
    color: white;
    position: absolute;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="question">Hey Mrs Khouloud Laallam Mouataz "future wife" 😏❤️ Wanna play a little game with me?</h1>
    <div id="inputBox"></div>

    <button id="yes">Yes</button>
    <button id="no">No</button>
</div>

<script>

let step = 0;
let answers = [];

const questions = [
    "Tell me anything you feel about me ❤️",
    "Why did you say yes to me? 😳",
    "When did you fall for me? 🥺",
    "Am I allowed to kiss you on the cheek next time... or should I bite you? 😏",
    "Would you be the mother of my children? ❤️"
];

const question = document.getElementById("question");
const inputBox = document.getElementById("inputBox");
const yes = document.getElementById("yes");
const no = document.getElementById("no");

yes.onclick = () => {

    const input = document.querySelector("textarea");
    if (input) {
        answers.push(input.value);
    }

    step++;

    if (step <= 4) {
        question.innerText = questions[step - 1];

        inputBox.innerHTML = `
            <textarea placeholder="Type your answer here..."></textarea>
        `;
    }

    if (step === 5) {
        question.innerText = questions[4];
        inputBox.innerHTML = "";
    }

    if (step > 5) {
        sendAnswers();
    }
};

// RUNNING NO BUTTON 😈
no.onmouseover = () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    no.style.left = x + "px";
    no.style.top = y + "px";
};


    function sendAnswers() {

    let message = "";

    answers.forEach((ans, i) => {
        message += (i + 1) + ". " + ans + "\n\n";
    });

    fetch("https://formspree.io/f/abcd1234", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message
        })
    });

    question.innerText = "Thank you for not saying no to me 😂❤️ I love you so much 💖";

    yes.style.display = "none";
    no.style.display = "none";

}

</script>

</body>
</html>
